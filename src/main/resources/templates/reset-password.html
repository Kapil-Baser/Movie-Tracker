<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/head :: head (pageTitle='Reset password') }">
</head>
<body>
<div class="min-h-screen grid grid-rows-[auto_1fr] bg-gradient-to-br from-emerald-950 via-emerald-800 to-emerald-950">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    <div class="flex flex-col justify-center p-4">
        <div class="sm:mx-auto sm:w-full sm:max-w-sm">
            <section class="flex flex-col my-4 text-white space-y-2">
                <span class="text-2xl font-semibold">Set your new password</span>
            </section>

            <form th:action="@{/auth/processResetPassword}" method="POST" th:object="${passwordResetDto}" class="space-y-4">
                <!-- Errors if any -->
                <div th:if="${#fields.hasAnyErrors()}">
                    <div class="rounded-md bg-red-50 p-2">
                        <div class="flex justify-center">
                            <div class="flex-shrink-0">
                                <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                    <path fill-rule="evenodd"
                                          d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z"
                                          clip-rule="evenodd" />
                                </svg>
                            </div>
                            <div class="ml-3">
                                <p th:each="err : ${#fields.allErrors()}" th:text="${err}" class="text-sm font-medium text-red-800">Invalid
                                    password</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col space-y-2">
                    <input type="hidden" th:field="*{token}">
                    <label for="newPassword" class="block text-sm/6 font-medium text-gray-100">New password*</label>
                    <input id="newPassword" type="password" name="newPassword" th:field="*{newPassword}" required
                           autocomplete="new-password"
                           class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 focus:outline-2 focus:-outline-offset-2 focus:outline-emerald-500 sm:text-sm/6" />

                    <label for="confirmPassword" class="block text-sm/6 font-medium text-gray-100">Confirm new password*</label>
                    <input id="confirmPassword" type="password" name="confirmPassword" th:field="*{confirmNewPassword}" required
                           autocomplete="new-password"
                           class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 focus:outline-2 focus:-outline-offset-2 focus:outline-emerald-500 sm:text-sm/6" />
                </div>
                <div>
                    <button type="submit"
                            class="flex w-full justify-center rounded-md bg-amber-900 px-3 py-1.5 text-sm/6 font-semibold text-white hover:bg-amber-800 transition-all duration-300 cursor-pointer">Update</button>
                </div>

            </form>

        </div>
    </div>
</div>
</body>
</html>
