<nav th:fragment="navbar" class="w-full flex justify-between bg-emerald-900 p-1.5 font-medium text-white">
    <div class="flex items-center mx-3 space-x-8">
        <a th:href="@{/}" class="relative ml-3 group
          after:absolute after:bottom-0 after:left-0
          after:h-[2px] after:w-0 after:bg-emerald-500
          after:transition-all after:duration-300
          hover:after:w-full">Home</a>
        <a th:href="@{/upcoming}" class="relative group
          after:absolute after:bottom-0 after:left-0
          after:h-[2px] after:w-0 after:bg-emerald-500
          after:transition-all after:duration-300
          hover:after:w-full">Upcoming</a>
        <a th:href="@{/trending}" class="relative group
          after:absolute after:bottom-0 after:left-0
          after:h-[2px] after:w-0 after:bg-emerald-500
          after:transition-all after:duration-300
          hover:after:w-full">Trending</a>
    </div>

    <form action="#" th:action="@{/movies/search}" method="GET">
        <div class="flex rounded-full border-2 border-emerald-600 overflow-hidden max-w-md mx-auto">
            <input type="search" placeholder="Search a Movie..."
                   class="w-full outline-none bg-white text-sm px-5 py-2 text-gray-700"
                   name="keyword" th:value="${keyword}"/>
            <button type="submit" class="flex items-center justify-center bg-amber-900 hover:bg-amber-800 px-6">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192.904 192.904" width="18px" class="fill-white">
                    <path
                            d="m190.707 180.101-47.078-47.077c11.702-14.072 18.752-32.142 18.752-51.831C162.381 36.423 125.959 0 81.191 0 36.422 0 0 36.423 0 81.193c0 44.767 36.422 81.187 81.191 81.187 19.688 0 37.759-7.049 51.831-18.751l47.079 47.078a7.474 7.474 0 0 0 5.303 2.197 7.498 7.498 0 0 0 5.303-12.803zM15 81.193C15 44.694 44.693 15 81.191 15c36.497 0 66.189 29.694 66.189 66.193 0 36.496-29.692 66.187-66.189 66.187C44.693 147.38 15 117.689 15 81.193z">
                    </path>
                </svg>
            </button>
        </div>
    </form>

    <!-- Show only when not logged in -->
    <div sec:authorize="isAnonymous()" class="flex">
        <a th:href="@{/auth/login}" class="rounded-md bg-amber-900 py-2 px-4 border border-transparent text-center text-sm text-white transition-all shadow-md hover:shadow-lg focus:bg-amber-800 focus:shadow-none active:bg-amber-800 hover:bg-amber-800 active:shadow-none disabled:pointer-events-none disabled:opacity-50 disabled:shadow-none ml-2">Log in</a>
        <a th:href="@{/register}" class="rounded-md bg-amber-900 py-2 px-4 border border-transparent text-center text-sm text-white transition-all shadow-md hover:shadow-lg focus:bg-amber-800 focus:shadow-none active:bg-amber-800 hover:bg-amber-800 active:shadow-none disabled:pointer-events-none disabled:opacity-50 disabled:shadow-none ml-2">Register</a>
    </div>


    <!-- Show only when logged in -->
    <div sec:authorize="isAuthenticated()" class="flex items-center mx-3 space-x-8">
        <div>
            <a th:href="@{/user/movies/history}" class="relative ml-3 group
          after:absolute after:bottom-0 after:left-0
          after:h-[2px] after:w-0 after:bg-emerald-500
          after:transition-all after:duration-300
          hover:after:w-full">Watched History</a>
        </div>
        <div class="relative inline-flex mr-4" _="on click elsewhere add .hidden to #dropdown-menu">
            <button _="on click toggle .hidden on #dropdown-menu"
                    type="button"
                    class="inline-flex cursor-pointer items-center justify-center gap-2 rounded-md bg-amber-900 px-4 py-2 text-center
                           text-sm font-semibold text-white shadow-xs transition-all duration-500 hover:bg-amber-800">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13.3331 5.83333C13.3331 7.67428 11.8407 9.16667 9.99976 9.16667C8.15881 9.16667 6.66642 7.67428 6.66642 5.83333C6.66642 3.99238 8.15881 2.5 9.99976 2.5C11.8407 2.5 13.3331 3.99238 13.3331 5.83333Z" stroke="black" stroke-width="1.6" />
                    <path d="M9.99976 11.6667C7.62619 11.6667 5.54235 12.752 4.36109 14.3865C3.73609 15.2513 3.42359 15.6837 3.88775 16.5918C4.35192 17.5 5.12342 17.5 6.66642 17.5H13.3331C14.8761 17.5 15.6476 17.5 16.1118 16.5918C16.5759 15.6837 16.2634 15.2513 15.6384 14.3865C14.4572 12.752 12.3733 11.6667 9.99976 11.6667Z" stroke="black" stroke-width="1.6" />
                </svg>
                <span th:text="${#authentication.principal.email}">Username</span>
                <svg class="size-2.5 text-white" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 5L8.16086 10.6869C8.35239 10.8637 8.64761 10.8637 8.83914 10.6869L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                </svg>
            </button>
            <div id="dropdown-menu" class="hidden absolute top-full mt-2 w-full divide-y divide-gray-200 rounded-xl bg-white shadow-lg">
                <ul class="py-2">
                    <li>
                        <a th:href="@{/collections}" class="block px-6 py-2 font-medium text-gray-900 hover:text-indigo-600" href="javascript:;"> My Lists </a>
                    </li>
                    <li>
                        <a th:href="@{/user/profile}" class="block px-6 py-2 font-medium text-gray-900 hover:text-indigo-600"> Settings </a>
                    </li>
                </ul>
                <div class="py-2">
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="block px-6 py-2 text-red-500 hover:cursor-pointer">Log Out</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</nav>
