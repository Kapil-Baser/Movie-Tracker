<!-- FORM START -->
<form th:fragment="deactivate-form" hx:post="@{/user/deactivate-account}" hx-target="this" hx-swap="outerHTML" method="POST"
      th:object="${userPasswordDto}" th:action="@{/deactivate-account}">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <div class="bg-emerald-900 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
        <div class="sm:flex sm:items-start">
            <div
                    class="mx-auto flex size-12 shrink-0 items-center justify-center rounded-full bg-red-500/30 sm:mx-0 sm:size-10">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"
                     class="size-6 text-red-400">
                    <path
                            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"
                            stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </div>

            <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
                <h3 id="dialog-title" class="text-base font-semibold text-white">
                    Deactivate account
                </h3>

                <p class="mt-2 text-sm text-gray-400">
                    Are you sure you want to deactivate your account? All of your
                    data will be permanently removed. This action cannot be undone.
                </p>

                <!-- PASSWORD INPUT -->
                <div class="mt-4">
                    <label for="current_password" class="block text-sm font-medium text-gray-300">
                        Current password
                    </label>
                    <input id="current_password" th:field="*{currentPassword}" type="password" required
                           class="mt-1 block w-full rounded-md bg-gray-600/5 border border-white/10 px-3 py-2 text-white shadow-sm focus:border-red-500 focus:ring focus:ring-red-500/30 sm:text-sm" />
                </div>
                <div th:if="${#fields.hasErrors('currentPassword')}" class="mt-2 text-sm text-red-400"
                     th:errors="*{currentPassword}">
                </div>
            </div>
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="bg-emerald-900 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
        <button type="submit"
                class="inline-flex w-full justify-center rounded-md bg-red-500 px-3 py-2 text-sm font-semibold text-white hover:bg-red-400 sm:ml-3 sm:w-auto">
            Deactivate
        </button>

        <button type="button" popovertarget="deactivate-modal" popovertargetaction="hide"
                class="mt-3 inline-flex w-full justify-center rounded-md bg-white/10 px-3 py-2 text-sm font-semibold text-white inset-ring inset-ring-white/5 hover:bg-white/20 sm:mt-0 sm:w-auto">
            Cancel
        </button>
    </div>
</form>
<!-- FORM END -->

<!--Modal HTML Fragment with hyperscript and htmx-->
<div th:fragment="movie-collection-form" id="modal"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
     _="on closeModal remove me">
    <!-- Overlay / click outside -->
    <div class="absolute inset-0" _="on click trigger closeModal"></div>

    <!-- Modal content -->
    <div class="relative w-full max-w-md rounded-lg bg-emerald-800 p-4 text-white shadow-xl">

        <!-- Movie collection form -->
        <form hx:post="@{/user/collections/add-movie}"
              hx-target="#toast-container"
              hx-swap="beforeend"
              hx:vals="${ {_csrf.parameterName : _csrf.token} }"
              _="on htmx:afterRequest(detail) if detail.successful remove #modal"
              th:object="${selectedCollection}">

            <div class="flex items-start justify-between gap-2">
                <span class="block break-words leading-snug  text-lg font-semibold" th:text="|Add '*{selectedMovieTitle}' to collection|">Add movie to collection</span>

                <button class="cursor-pointer p-1 rounded-sm hover:bg-black/10 text-red-500"
                        _="on click trigger closeModal"
                        aria-label="Close modal"
                        type="button">

                    <svg xmlns="http://www.w3.org/2000/svg"
                         viewBox="0 0 24 24"
                         fill="currentColor"
                         class="h-6 w-6">
                        <path fill-rule="evenodd"
                              d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z"
                              clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
            <!-- Hidden field to carry the movieId -->
            <input type="hidden" th:field="*{selectedMovieId}" />
            <input type="hidden" th:field="*{selectedMovieTitle}" />

            <label for="collectionSelect" class="sr-only">Underline select</label>

            <div class="relative mt-4 group">
                <select _="on change or load if my.value is not '' remove [@disabled] from #addBtn else add [@disabled] to #addBtn"
                        id="collectionSelect" th:field="*{selectedCollectionId}"
                        class="block w-full appearance-none rounded-md border border-emerald-500 bg-emerald-900 px-3 py-2 pr-10 text-sm
                           text-white shadow-sm focus:border-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-400/30">
                    <option value="">Choose a collection</option>
                    <!-- Iterate over the list sent from the controller -->
                    <option th:each="col : ${userCollections}" th:value="${col.id}"
                            th:text="${col.name}"
                            th:disabled="${col.alreadyContainsMovie}" th:classappend="${col.alreadyContainsMovie} ? 'opacity-50 cursor-not-allowed'">

                    </option>
                </select>

                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
                    <svg class="h-5 w-5 text-emerald-300 transition-colors group-focus-within:text-emerald-400"
                         viewBox="0 0 20 20" fill="none" aria-hidden="true">
                        <path d="M6 8l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                              stroke-linejoin="round" />
                    </svg>
                </div>
            </div>

            <div class="flex justify-between items-center mt-4">

                <div>
                    <a th:href="@{/collections}"
                       class="text-sm font-medium text-emerald-400 hover:underline">
                        + Create a collection
                    </a>
                </div>

                <button id="addBtn"
                        class="cursor-pointer rounded-md bg-amber-900 px-3 py-1 text-sm/6 font-semibold text-white
                         transition-all duration-300 hover:bg-amber-800 disabled:opacity-50 disabled:cursor-not-allowed"
                        type="submit">ADD</button>
            </div>
        </form>
    </div>
</div>
