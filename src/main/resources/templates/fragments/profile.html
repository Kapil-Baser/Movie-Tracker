<!-- User default dashboard view -->
<div th:fragment="dashboard" class="space-y-6">
    <div class="flex items-center space-x-4">
        <div
                class="w-20 h-20 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                 class="w-10 h-10 text-white">
                <path fill-rule="evenodd"
                      d="M18.685 19.097A9.723 9.723 0 0021.75 12c0-5.385-4.365-9.75-9.75-9.75S2.25 6.615 2.25 12a9.723 9.723 0 003.065 7.097A9.716 9.716 0 0012 21.75a9.716 9.716 0 006.685-2.653zm-12.54-1.285A7.486 7.486 0 0112 15a7.486 7.486 0 015.855 2.812A8.224 8.224 0 0112 20.25a8.224 8.224 0 01-5.855-2.438zM15.75 9a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"
                      clip-rule="evenodd"></path>
            </svg>
        </div>
        <div>
            <h2 th:text="${#authentication.name}" class="text-2xl font-bold text-white">John Doe</h2>
            <p th:text="${#authentication.principal.email}" class="text-emerald-100">john.doe@example.com</p>
        </div>
    </div>

    <div id="profile-main-content">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8">
            <div class="bg-emerald-700/50 bg-opacity-10 rounded-lg p-4">
                <h3 class="text-emerald-100 text-sm font-medium">Member Since</h3>
                <p th:text="${memberSince}" class="text-white text-lg font-semibold">January 2023</p>
            </div>
            <div class="bg-emerald-700/50 bg-opacity-10 rounded-lg p-4">
                <h3 class="text-emerald-100 text-sm font-medium">Total Collections</h3>
                <p th:text="${collectionCount}" class="text-white text-lg font-semibold">12</p>
            </div>
            <div class="bg-emerald-700/50 bg-opacity-10 rounded-lg p-4">
                <h3 class="text-emerald-100 text-sm font-medium">Favorite Genre</h3>
                <p class="text-white text-lg font-semibold">Action</p>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="text-white text-lg font-semibold mb-4">Recent Activity</h3>
            <div class="space-y-3">
                <div class="flex items-center space-x-3 text-emerald-100">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full"></div>
                    <span>Added 'Action Movies' to collections</span>
                </div>
                <div class="flex items-center space-x-3 text-emerald-100">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full"></div>
                    <span>Updated profile picture</span>
                </div>
                <div class="flex items-center space-x-3 text-emerald-100">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full"></div>
                    <span>Followed 5 new users</span>
                </div>
            </div>
        </div>

        <dialog id="deactivate-modal" popover="auto"
             class="fixed left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[26rem] max-w-full rounded-lg text-white shadow-xl border-emerald-400/50 border-opacity-20 border-1">
            <!-- Form for taking in user password to confirm -->
            <div id="deactivate-dialog-form"></div>
        </dialog>

        <div class="flex justify-end mt-auto pt-8">
            <button hx-get="/user/deactivate-modal" hx-target="#deactivate-dialog-form" hx-swap="innerHTML"
                    popovertarget="deactivate-modal"
                    class="rounded-md bg-red-800 px-2.5 py-1.5 text-sm font-semibold text-white inset-ring inset-ring-white/5 hover:bg-red-700">Deactivate
                Account</button>
        </div>
    </div>
</div>
