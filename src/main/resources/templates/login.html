<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/head :: head (pageTitle='Log in') }">
</head>
<body>

    <header class="fixed top-0 left-0 right-0">
        <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    </header>

    <main>
        <div class="min-h-screen grid bg-gradient-to-br from-emerald-950 via-emerald-800 to-emerald-950">
            <div class="flex flex-col justify-center p-4">
                <div class="sm:mx-auto sm:w-full sm:max-w-sm">
                    <img src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=500" alt="Your Company" class="mx-auto h-10 w-auto" />
                    <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-white">Sign in to your account</h2>

                    <!-- Show only if user is coming from a successful change password request  -->
                    <div th:if="${passwordChangeSuccess}" role="alert" class="mt-3 relative flex flex-col w-full p-3 text-sm text-white bg-emerald-700/80 rounded-md">
                        <p class="flex text-base">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                 stroke="currentColor" class="h-5 w-5 mr-2 mt-0.5">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z">
                                </path>
                            </svg>
                            Success
                        </p>
                        <p class="ml-4 p-3 leading-tight">
                            Password changed successfully! <br> Please log in again with your new password.
                        </p>

                        <!-- Inline handling of the onclick event to hide the parent div -->
                        <button hx-on:click="this.closest('[role=alert]').classList.add('hidden')"
                                class="flex items-center justify-center transition-all w-8 h-8 rounded-md text-white hover:bg-white/10 active:bg-white/10 absolute top-1.5 right-1.5 hover:cursor-pointer"
                                type="button">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                 class="h-5 w-5" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>

                    <div th:if="${redirectInfo}" th:replace="~{fragments/alerts :: genericAlert(alertInfo=${redirectInfo})}"></div>
                </div>

                <div class="sm:mx-auto sm:w-full sm:max-w-sm space-y-4">
                    <div th:if="${loginError}" >
                        <div class="rounded-md bg-red-50 p-2">
                            <div class="flex justify-center">
                                <div class="flex-shrink-0">
                                    <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" />
                                    </svg>
                                </div>
                                <div class="ml-3">
                                    <h3 th:text="${loginError}" class="text-sm font-medium text-red-800">Invalid Username and Password</h3>
                                </div>
                            </div>
                        </div>
                    </div>


                    <form th:action="@{/auth/login}" method="POST" class="space-y-6">
                        <div>
                            <label for="username" class="block text-sm/6 font-medium text-gray-100">Username</label>
                            <div class="mt-2">
                                <input id="username" type="text" name="username" required autocomplete="username"
                                       class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 focus:outline-2 focus:-outline-offset-2 focus:outline-emerald-500 sm:text-sm/6" />
                            </div>
                        </div>

                        <div>
                            <div class="flex items-center justify-between">
                                <label for="password" class="block text-sm/6 font-medium text-gray-100">Password</label>
                                <div class="text-sm">
                                    <a th:href="@{/auth/forgetPassword}" class="font-semibold text-indigo-400 hover:text-indigo-300">Forgot password?</a>
                                </div>
                            </div>
                            <div class="mt-2">
                                <input id="password" type="password" name="password" required autocomplete="current-password" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white
                        outline-1 -outline-offset-1 outline-white/10 focus:outline-2 focus:-outline-offset-2
                        focus:outline-emerald-500 sm:text-sm/6" />
                            </div>
                        </div>

                        <div>
                            <button type="submit" class="flex w-full justify-center rounded-md
                                            bg-amber-900 hover:bg-amber-800 transition-all duration-300
                                            px-3 py-1.5 text-sm/6 font-semibold text-white hover:cursor-pointer
                                            ">Sign in</button>
                        </div>
                    </form>

                    <a th:href="@{/oauth2/authorization/google}"
                       class="flex items-center justify-center border rounded-lg shadow-md
                      px-6 py-1.5 text-sm font-medium text-white hover:border-emerald-400 hover:text-emerald-400
                      focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 w-full transition-all duration-300">
                        <svg class="h-6 w-6 mr-2" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
                             width="800px" height="800px" viewBox="-0.5 0 48 48" version="1.1">
                            <title>Google-color</title>
                            <desc>Created with Sketch.</desc>
                            <defs> </defs>
                            <g id="Icons" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
                                <g id="Color-" transform="translate(-401.000000, -860.000000)">
                                    <g id="Google" transform="translate(401.000000, 860.000000)">
                                        <path
                                                d="M9.82727273,24 C9.82727273,22.4757333 10.0804318,21.0144 10.5322727,19.6437333 L2.62345455,13.6042667 C1.08206818,16.7338667 0.213636364,20.2602667 0.213636364,24 C0.213636364,27.7365333 1.081,31.2608 2.62025,34.3882667 L10.5247955,28.3370667 C10.0772273,26.9728 9.82727273,25.5168 9.82727273,24"
                                                id="Fill-1" fill="#FBBC05"> </path>
                                        <path
                                                d="M23.7136364,10.1333333 C27.025,10.1333333 30.0159091,11.3066667 32.3659091,13.2266667 L39.2022727,6.4 C35.0363636,2.77333333 29.6954545,0.533333333 23.7136364,0.533333333 C14.4268636,0.533333333 6.44540909,5.84426667 2.62345455,13.6042667 L10.5322727,19.6437333 C12.3545909,14.112 17.5491591,10.1333333 23.7136364,10.1333333"
                                                id="Fill-2" fill="#EB4335"> </path>
                                        <path
                                                d="M23.7136364,37.8666667 C17.5491591,37.8666667 12.3545909,33.888 10.5322727,28.3562667 L2.62345455,34.3946667 C6.44540909,42.1557333 14.4268636,47.4666667 23.7136364,47.4666667 C29.4455,47.4666667 34.9177955,45.4314667 39.0249545,41.6181333 L31.5177727,35.8144 C29.3995682,37.1488 26.7323182,37.8666667 23.7136364,37.8666667"
                                                id="Fill-3" fill="#34A853"> </path>
                                        <path
                                                d="M46.1454545,24 C46.1454545,22.6133333 45.9318182,21.12 45.6113636,19.7333333 L23.7136364,19.7333333 L23.7136364,28.8 L36.3181818,28.8 C35.6879545,31.8912 33.9724545,34.2677333 31.5177727,35.8144 L39.0249545,41.6181333 C43.3393409,37.6138667 46.1454545,31.6490667 46.1454545,24"
                                                id="Fill-4" fill="#4285F4"> </path>
                                    </g>
                                </g>
                            </g>
                        </svg>
                        <span>Continue with Google</span>
                    </a>

                    <p class="mt-10 text-center text-sm/6 text-gray-400">
                        Not a member?
                        <a th:href="@{/register}" class="font-semibold text-indigo-400 hover:text-indigo-300">Click here to register</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
