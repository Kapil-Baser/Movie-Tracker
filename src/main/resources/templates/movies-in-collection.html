<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
          xmlns:hx="http://www.w3.org/1999/xhtml">
    <head th:replace="~{fragments/head :: head (pageTitle='Collections')}">
    </head>
<body>
    <header th:replace="~{fragments/head :: navbar}">
    </header>

    <main>
        <div id="top-sentinel" class="absolute top-50 h-px w-px invisible" aria-hidden="true"></div>
        <div class="bg-gradient-to-br from-emerald-950 via-emerald-900 to-emerald-950 pt-2 min-h-[calc(100vh-3rem)] mt-[48px]">
            <div class="flex items-start justify-center px-4 sm:px-8 md:px-16 lg:px-32 xl:px-40">
                <div class="w-full max-w-2xl lg:max-w-4xl space-y-2">
                    <div class="grid grid-cols-3 items-center">
                        <a th:href="@{/collections}" class="w-fit justify-self-start ml-1 relative group
                                  after:absolute after:bottom-0 after:left-0
                                  after:h-[2px] after:w-0 after:bg-emerald-500
                                  after:transition-all after:duration-300
                                  hover:after:w-full">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                                 class="size-8 text-white">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 15.75 3 12m0 0 3.75-3.75M3 12h18" />
                            </svg>
                        </a>
                        <span th:text="${collectionName}" class="text-white text-center text-4xl leading-none py-2 whitespace-nowrap">Favorite Movies</span>
                    </div>
                    <th:block th:replace="~{fragments/page :: movieCollection}"></th:block>
                    <!-- Empty/Paging State -->
                    <div  th:if="${#lists.isEmpty(movies)}" class="flex-1 flex flex-col items-center justify-center text-center text-white text-xl py-12">
                        <p>No movies found 😔</p>
                        <p class="text-sm mt-2 text-gray-400">Add movies to your collection</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <th:block th:replace="~{fragments/buttons :: backToTop}"></th:block>
</body>
</html>
