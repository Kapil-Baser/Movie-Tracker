<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Log in</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, intial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
<div th:replace="~{/fragments/navbar :: navbar}"></div>

<div class="flex flex-col justify-center sm:h-screen p-4 bg-gray-900">
    <div class="max-w-md w-full mx-auto border border-gray-300 rounded-2xl p-8 text-white">
        <div class="text-center mb-12 text-2xl font-semibold">
            <h3>Register Now</h3>
        </div>
        <div th:if="${error}" class="error-message">
            <p th:text="${error}"></p>
        </div>
        <form action="#" th:action="@{/auth/register/save}" th:object="${user}" method="POST">
            <div class="space-y-6">
                <div>
                    <label for="username" class="text-sm font-medium mb-2 block">Username</label>
                    <input autocomplete="username" name="username" th:field="*{username}" id="username" type="text" required th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''" class="text-slate-900 bg-white border border-gray-300 w-full text-sm px-4 py-3 rounded-md outline-blue-500" placeholder="Username" />
                    <div th:if="${#fields.hasErrors('username')}" class="invalid-feedback">
                        <p th:errors="*{username}"></p>
                    </div>
                </div>
                <div>
                    <label for="email" class="text-sm font-medium mb-2 block">Email Id</label>
                    <input name="email" type="email" required autocomplete="email" th:field="*{email}" id="email" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" class="text-slate-900 bg-white border border-gray-300 w-full text-sm px-4 py-3 rounded-md outline-blue-500" placeholder="Enter email" />
                    <div th:if="${#fields.hasErrors('email')}" class="invalid-feedback">
                        <p th:errors="*{email}"></p>
                    </div>
                </div>
                <div>
                    <label for="password" class="text-sm font-medium mb-2 block">Password</label>
                    <input name="password" type="password" id="password" th:field="*{password}" required autocomplete="current-password" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" class="text-slate-900 bg-white border border-gray-300 w-full text-sm px-4 py-3 rounded-md outline-blue-500" placeholder="Enter password" />
                    <div th:if="${#fields.hasErrors('password')}" class="invalid-feedback">
                        <p th:errors="*{password}"></p>
                    </div>
                </div>
                <div>
                    <label for="confirm-password" class="text-sm font-medium mb-2 block">Confirm Password</label>
                    <input name="password" type="password" required th:field="*{confirmPassword}" autocomplete="current-password" id="confirm-password" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''" class="text-slate-900 bg-white border border-gray-300 w-full text-sm px-4 py-3 rounded-md outline-blue-500" placeholder="Enter confirm password" />
                    <div th:if="${#fields.hasErrors('confirmPassword')}" class="invalid-feedback">
                        <p th:errors="*{confirmPassword}"></p>
                    </div>
                </div>

                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 shrink-0 text-blue-600 focus:ring-blue-500 border-gray-300 rounded" />
                    <label for="remember-me" class="text-slate-600 ml-3 block text-sm">
                        I accept the <a href="javascript:void(0);" class="text-blue-600 font-medium hover:underline ml-1">Terms and Conditions</a>
                    </label>
                </div>
            </div>

            <div class="mt-12">
                <button type="submit" class="w-full py-3 px-4 text-sm tracking-wider font-medium rounded-md text-white bg-indigo-500 hover:bg-indigo-400 focus:outline-none cursor-pointer">
                    Create an account
                </button>
            </div>
            <p class="text-slate-600 text-sm mt-6 text-center">Already have an account? <a th:href="@{/auth/login}" href="javascript:void(0);" class="text-blue-600 font-medium hover:underline ml-1">Login here</a></p>
        </form>
    </div>
</div>
</body>
</html>
