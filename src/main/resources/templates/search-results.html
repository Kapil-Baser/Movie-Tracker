<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/head :: head (pageTitle='Search results')}">
</head>
<body>
    <header th:replace="~{fragments/head :: navbar}">
    </header>

    <main>
        <div id="top-sentinel" class="absolute top-50 h-px w-px invisible" aria-hidden="true"></div>
        <div class="bg-gradient-to-br from-emerald-950 via-emerald-900 to-emerald-950 pt-2 min-h-[calc(100vh-3rem)] mt-[48px]">
            <div class="flex items-start justify-center px-4 py-8 sm:px-8 md:px-16 lg:px-32 xl:px-40">
                <div class="w-full max-w-2xl lg:max-w-4xl space-y-2">
                    <th:block th:replace="~{fragments/search-results :: search-results-card (searchResults=${searchResults})}"></th:block>
                    <!-- Empty/Paging State -->
                    <div th:if="${#lists.isEmpty(searchResults.movieCards)}" class="flex-1 flex flex-col items-center justify-center text-center text-white text-xl py-12">
                        <p>No movies found 😔</p>
                        <p class="text-sm mt-2 text-gray-400">There are no movies that matched your query.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="toast-container" class="fixed top-5 right-5 flex flex-col gap-2 z-50"></div>
    <th:block th:replace="~{fragments/buttons :: backToTop}"></th:block>
</body>
</html>
