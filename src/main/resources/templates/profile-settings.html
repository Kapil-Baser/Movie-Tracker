<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/head :: head (pageTitle='Account Settings')}">
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="bg-gradient-to-br from-emerald-950 via-emerald-900 to-emerald-950 pt-2 min-h-screen">
        <div class="flex items-start justify-center px-4 sm:px-8 md:px-16 lg:px-32 xl:px-40">
            <div class="w-full max-w-6xl space-y-2">
                <div class="flex gap-6 h-[calc(100vh-20rem)] mt-8">
                    <!-- Sidebar -->
                    <div class="w-64 flex-shrink-0">
                        <div
                                class="relative flex flex-col rounded-xl bg-emerald-700 bg-clip-border p-4 text-white shadow-xl h-full">
                            <div class="p-4 mb-2">
                                <h5 class="block font-sans text-xl antialiased font-semibold leading-snug tracking-normal">
                                    Account Settings
                                </h5>
                            </div>

                            <nav class="flex flex-col gap-1 p-2 font-sans text-base font-normal flex-grow">
                                <!-- Inbox Button -->
                                <div role="button" hx-get="/account/inbox" hx-target="#main-content" hx-swap="innerHTML"
                                     class="flex items-center w-full p-3 leading-tight transition-all rounded-lg outline-none text-start text-white hover:bg-emerald-800 hover:bg-opacity-80 focus:bg-opacity-80 active:bg-opacity-80 cursor-pointer">
                                    <div class="grid mr-4 place-items-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"
                                             class="w-5 h-5">
                                            <path fill-rule="evenodd"
                                                  d="M6.912 3a3 3 0 00-2.868 2.118l-2.411 7.838a3 3 0 00-.133.882V18a3 3 0 003 3h15a3 3 0 003-3v-4.162c0-.299-.045-.596-.133-.882l-2.412-7.838A3 3 0 0017.088 3H6.912zm13.823 9.75l-2.213-7.191A1.5 1.5 0 0017.088 4.5H6.912a1.5 1.5 0 00-1.434 1.059L3.265 12.75H6.11a3 3 0 012.684 1.658l.256.513a1.5 1.5 0 001.342.829h3.218a1.5 1.5 0 001.342-.83l.256-.512a3 3 0 012.684-1.658h2.844z"
                                                  clip-rule="evenodd"></path>
                                        </svg>
                                    </div>
                                    <span class="flex-grow">Inbox</span>
                                    <div class="grid place-items-center">
                                        <div
                                                class="relative grid items-center px-2 py-1 font-sans text-xs font-bold uppercase rounded-full select-none whitespace-nowrap">
                                            <span class="">14</span>
                                        </div>
                                    </div>
                                </div>

                                <!-- Profile Button (Active by default) -->
                                <div role="button" hx-get="/user/dashboard" hx-target="#main-content" hx-swap="innerHTML"
                                     id="profile-button"
                                     class="flex items-center w-full p-3 leading-tight transition-all rounded-lg outline-none text-start bg-emerald-900 bg-opacity-80 font-medium cursor-pointer">
                                    <div class="grid mr-4 place-items-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"
                                             class="w-5 h-5">
                                            <path fill-rule="evenodd"
                                                  d="M18.685 19.097A9.723 9.723 0 0021.75 12c0-5.385-4.365-9.75-9.75-9.75S2.25 6.615 2.25 12a9.723 9.723 0 003.065 7.097A9.716 9.716 0 0012 21.75a9.716 9.716 0 006.685-2.653zm-12.54-1.285A7.486 7.486 0 0112 15a7.486 7.486 0 015.855 2.812A8.224 8.224 0 0112 20.25a8.224 8.224 0 01-5.855-2.438zM15.75 9a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"
                                                  clip-rule="evenodd"></path>
                                        </svg>
                                    </div>
                                    <span class="flex-grow">Profile</span>
                                </div>

                                <!-- Settings Button -->
                                <div role="button" hx:get="@{/user/account/settings}" hx-target="#profile-main-content" hx-swap="innerHTML"
                                     class="flex items-center w-full p-3 leading-tight transition-all rounded-lg outline-none text-start text-white hover:bg-emerald-800 hover:bg-opacity-80 focus:bg-opacity-80 active:bg-opacity-80 cursor-pointer">
                                    <div class="grid mr-4 place-items-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"
                                             class="w-5 h-5">
                                            <path fill-rule="evenodd"
                                                  d="M11.078 2.25c-.917 0-1.699.663-1.85 1.567L9.05 4.889c-.02.12-.115.26-.297.348a7.493 7.493 0 00-.986.57c-.166.115-.334.126-.45.083L6.3 5.508a1.875 1.875 0 00-2.282.819l-.922 1.597a1.875 1.875 0 00.432 2.385l.84.692c.095.078.17.229.154.43a7.598 7.598 0 000 1.139c.015.2-.059.352-.153.43l-.841.692a1.875 1.875 0 00-.432 2.385l.922 1.597a1.875 1.875 0 002.282.818l1.019-.382c.115-.043.283-.031.45.082.312.214.641.405.985.57.182.088.277.228.297.35l.178 1.071c.151.904.933 1.567 1.85 1.567h1.844c.916 0 1.699-.663 1.85-1.567l.178-1.072c.02-.12.114-.26.297-.349.344-.165.673-.356.985-.57.167-.114.335-.125.45-.082l1.02.382a1.875 1.875 0 002.28-.819l.923-1.597a1.875 1.875 0 00-.432-2.385l-.84-.692c-.095-.078-.17-.229-.154-.43a7.614 7.614 0 000-1.139c-.016-.2.059-.352.153-.43l.84-.692c.708-.582.891-1.59.433-2.385l-.922-1.597a1.875 1.875 0 00-2.282-.818l-1.02.382c-.114.043-.282.031-.449-.083a7.49 7.49 0 00-.985-.57c-.183-.087-.277-.227-.297-.348l-.179-1.072a1.875 1.875 0 00-1.85-1.567h-1.843zM12 15.75a3.75 3.75 0 100-7.5 3.75 3.75 0 000 7.5z"
                                                  clip-rule="evenodd"></path>
                                        </svg>
                                    </div>
                                    <span class="flex-grow">Settings</span>
                                </div>

                                <!-- Log Out Button -->
                                <form th:action="@{/logout}" method="POST"
                                      role="button"
                                      class="flex items-center mt-auto">
                                    <button class="flex text-start p-3 w-full leading-tight transition-all outline-none rounded-lg cursor-pointer hover:bg-gradient-to-br hover:from-red-900 hover:via-red-950 hover:to-red-900 hover:bg-opacity-80">
                                        <div class="grid mr-4 place-items-center">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" class="w-5 h-5">
                                                <path fill-rule="evenodd"
                                                      d="M12 2.25a.75.75 0 01.75.75v9a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM6.166 5.106a.75.75 0 010 1.06 8.25 8.25 0 1011.668 0 .75.75 0 111.06-1.06c3.808 3.807 3.808 9.98 0 13.788-3.807 3.808-9.98 3.808-13.788 0-3.808-3.807-3.808-9.98 0-13.788a.75.75 0 011.06 0z"
                                                      clip-rule="evenodd"></path>
                                            </svg>
                                        </div>
                                        <span class="flex-grow">Log Out</span>
                                    </button>
                                </form>
                            </nav>
                        </div>
                    </div>

                    <!-- Main Content Area -->
                    <div
                            class="flex-grow bg-emerald-800/50 bg-opacity-5 rounded-xl p-6 backdrop-blur-sm border border-emerald-400/50 border-opacity-20">
                        <div id="main-content" class="h-full">
                            <!-- Default Profile Content -->
                            <div th:replace="~{fragments/profile :: dashboard}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
          const buttons = document.querySelectorAll('[role="button"][hx-get]');

          // Function to remove active class from all buttons
          function removeActiveClass() {
            buttons.forEach(btn => {
              // Remove active styling
              btn.classList.remove('bg-emerald-900', 'bg-opacity-80', 'font-medium');

              // Add default styling
              btn.classList.add('text-white', 'hover:bg-emerald-800', 'hover:bg-opacity-80');
            });
          }

          // Add click event listeners to buttons
          buttons.forEach(button => {
            button.addEventListener('click', function () {
              removeActiveClass();

              // Add active styling to clicked button
              this.classList.remove('text-white', 'hover:bg-emerald-800', 'hover:bg-opacity-80');
              this.classList.add('bg-emerald-900', 'bg-opacity-80', 'font-medium');
            });
          });

          // Ensure profile button is active by default
          const profileButton = document.getElementById('profile-button');
          if (profileButton) {
            // Make sure it has the active styling (in case it was reset)
            profileButton.classList.remove('text-white', 'hover:bg-emerald-800', 'hover:bg-opacity-80');
            profileButton.classList.add('bg-emerald-900', 'bg-opacity-80', 'font-medium');
          }
        });
    </script>

</body>
</html>
