<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Now Playing</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, intial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="flex items-center justify-center bg-amber-500 pt-2">
    <div class="grid min-h-[50px] gap-2 gap-y-3 rounded-xl px-[20px] pt-2 sm:grid-cols-5">
        <div class="col-span-2 flex min-h-[50px] items-center rounded-lg shadow-xl">
            <div>
                <div class="m-4 max-w-20 border-t pt-2"><p></p></div>
                <h1 class="m-4 text-5xl">Upcoming Movies</h1>
                <span class="m-4 text-5xl">to Theaters</span>
                <p class="m-4 text-2xl font-light">Movies releasing within next two months</p>
                <div class="m-4 border-t-1"></div>
            </div>
        </div>
        <div th:each="movie : ${movies}" class="max-w-47 rounded-xl p-0.5 shadow-xl">
            <img th:src="${movie.posterPath}" class="rounded-xl" src="http://image.tmdb.org/t/p/w185/oD3Eey4e4Z259XLm3eD3WGcoJAh.jpg" />
            <div class="p-1">
                <p th:text="${movie.title}" class="font-bold">Now You See Me: Now You Don't</p>
                <span th:text="${movie.releaseDate}" class="text-sm font-semibold">Nov 7, 2025</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
