<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Subscribed movie streaming now</title>
</head>

<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
<div
        style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; background-color: oklch(0.508 0.118 165.612); color: white;">
  <span>Hi</span>
  <p><span style="color: oklch(0.765 0.177 163.223); font-style: italic;" th:text="${movie.title}">Regretting
                You</span> is out for streaming now.</p>
  <div style="display: flex; background-color: oklch(42.379% 0.08948 164.392); border-radius: 6px;">
    <img style="border-radius: 6px;" th:src="'http://image.tmdb.org/t/p/w92' + ${movie.posterPath}" src="http://image.tmdb.org/t/p/w92/z4gVnxTaks3anTycwKjDmvQSuWt.jpg"
         alt="Poster">
    <div style="display: flex; flex-direction: column; margin-left: 10px;">
                <span th:text="${movie.title}" style="font-size: 24px; list-style: 32px; color: oklch(88.962% 0.15979 169.348); font-weight: bold;">Regretting
                    You</span>
      <div>
        <span th:each="genre : ${movie.genres}" style="display: inline-block; color: oklch(0.765 0.177 163.223); font-weight: 600; margin-right: 8px;" th:text="${genre}">Drama</span>
      </div>
      <div
              style="font-size: 12px; line-height: 20px; font-weight: 100; display: flex; flex-direction: column; color: oklch(88.19% 0.1148 173.143);">
        <span th:text="${movie.releaseDate}">Jan 13, 2026</span>
        <span th:text="${movie.runtime}">1h 24min</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
