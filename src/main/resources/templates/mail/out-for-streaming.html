<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Subscribed movie streaming now</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #ffffff;">

<!-- Outer Container Table -->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
  <tr>
    <td align="center" style="padding: 20px 0;">

      <!-- Main Card Block -->
      <table role="presentation" width="600" cellspacing="0" cellpadding="10" border="0"
             style="width: 600px; max-width: 600px; border: 1px solid #ddd; border-radius: 10px; background-color: #27624c; color: #ffffff;">
        <tr>
          <td>

            <!-- Header Section -->
            <div style="font-size: 16px; margin-bottom: 6px; color: #ffffff;">
              <span>Hi,</span>
              <span style="color: #8ce1bd; font-style: italic; font-weight: bold;" th:text="${movie.title}">Regretting You</span>
              <span>is out for streaming now.</span>
            </div>

            <!-- Movie Details Wrapper Table (Replaces Flexbox) -->
            <table role="presentation" width="100%" cellspacing="0" cellpadding="12" border="0"
                   style="background-color: #174232; border-radius: 6px;">
              <tr>
                <!-- Image Column -->
                <td width="92" valign="top" style="padding: 12px; width: 92px;">
                  <img style="border-radius: 6px; display: block;"
                       th:src="'http://image.tmdb.org/t/p/w92' + ${movie.posterPath}"
                       src="http://image.tmdb.org/t/p/w92/z4gVnxTaks3anTycwKjDmvQSuWt.jpg"
                       width="92" alt="Poster">
                </td>

                <!-- Text Details Column -->
                <td valign="top" style="padding: 12px 12px 12px 10px; font-family: Arial, sans-serif;">

                  <!-- Title -->
                  <div th:text="${movie.title}" style="font-size: 24px; line-height: 32px; color: #bdf2dc; font-weight: bold; margin-bottom: 6px;">
                    Masters of the Universe
                  </div>

                  <!-- Meta Row (Genres & Bulletproof Trailer Button) -->
                  <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin-bottom: 10px;">
                    <tr>
                      <!-- Genres Area -->
                      <td valign="middle" style="padding-right: 15px;">
                          <span th:each="genre : ${movie.genres}"
                                style="display: inline-block; color: #8ce1bd; font-weight: 600; margin-right: 8px; font-size: 14px;"
                                th:text="${genre}">Drama</span>
                      </td>

                      <!-- Bulletproof Trailer Button Center -->
                      <td valign="middle">
                        <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="background-color: #184434; border: 1px solid #8ce1bd; border-radius: 6px;">
                          <tr>
                            <td align="center" valign="middle" style="padding: 3px 12px;">
                              <a th:href="@{${movie.trailer}}"
                                 href="#"
                                 target="_blank"
                                 style="font-size: 14px; font-family: Arial, sans-serif; font-weight: bold; text-decoration: none; color: #ffffff; display: inline-block;">
                                Trailer
                              </a>
                            </td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                  </table>

                  <!-- Release Date & Runtime -->
                  <div style="font-size: 12px; line-height: 20px; font-weight: normal; color: #b7eae1;">
                    <span th:text="${movie.releaseDate}" style="display: block;">Jan 13, 2026</span>
                    <span th:text="${movie.runtime}" style="display: block;">1h 24min</span>
                  </div>

                </td>
              </tr>
            </table>

          </td>
        </tr>
      </table>

    </td>
  </tr>
</table>

</body>
</html>
