
<!doctype html>
<html lang="en">
<head th:insert="~{fragments/head :: head (pageTitle='Create a collection')}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="bg-gradient-to-br from-emerald-950 via-emerald-900 to-emerald-950 pt-2 min-h-screen h-screen">
    <div class="flex items-start justify-center px-4 py-4 sm:px-8 md:px-16 lg:px-32 xl:px-40">
        <div class="w-full max-w-2xl lg:max-w-4xl space-y-2">

            <div><h2 class="text-3xl text-center pb-2 text-white border-b-1">New Collection</h2></div>

            <form th:action="@{/collections/save}" method="POST" th:object="${collectionDto}">
                <!-- Error goes above the input field -->
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-500 text-sm mt-1 flex justify-center">
                        This collection name already exists
                    </span>
                <div class="p-2 flex justify-center space-x-4">
                    <label for="name" class="text-white text-md">Name</label>
                    <input th:field="*{name}" th:errorclass="border-b-red-500" type="text"
                           id="name" value="" name="collectionName" required autocomplete="off"
                           class="bg-white w-2/4 border-b-emerald-400 border rounded-sm">
                </div>
                <div class="flex justify-center space-x-4 mt-2">
                    <button type="submit" class="bg-amber-900 px-4 rounded-md text-white p-2 hover:bg-amber-800 hover:cursor-pointer font-semibold inline-block">SAVE</button>
                    <a th:href="@{/collections}" class="bg-amber-900 px-4 rounded-md text-white p-2 hover:bg-amber-800 font-semibold inline-block">CANCEL</a>
                </div>
            </form>

        </div>
    </div>
</div>
</body>
</html>
