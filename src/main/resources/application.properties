spring.application.name=movieapi


# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_DOCKER_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type.json_format_mapper=com.example.movieapi.utility.CustomHibernateJsonFormatter

spring.config.import=optional:file:.env[.properties]

# Google login
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile, email, https://www.googleapis.com/auth/calendar, openid
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
#spring.security.oauth2.client.registration.google.client-authentication-method=client_secret_basic
#spring.security.oauth2.client.registration.google.authorization-parameters.prompt=consent
#spring.security.oauth2.client.registration.google.authorization-parameters.access_type=offline

# Mail properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SUPPORT_EMAIL}
spring.mail.password=${APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# TMDB API Key
api.key=${API_ACCESS_KEY}
base.url=https://api.themoviedb.org/3

# TMDB Image
image.base.url=http://image.tmdb.org/t/p/w185

# Trakt.tv API
trakt.api.key=${TRAKT_API_KEY}
trakt.client=${CLIENT_ID}
trakt.base.url=https://api.trakt.tv

# Logging
logging.level.org.springframework.security=TRACE
#logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
#logging.level.org.springframework.security.oauth2=TRACE

#Quartz Scheduler
org.quartz.jobStore.class=org.quartz.simpl.RAMJobStore